<html lang="en"><head>
    <meta charset="utf-8">
    <title>SimpliPlay for Xbox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <script src="libs/directionalnavigation-1.0.0.0.js"></script>
    <script src="uwpdisplaymode.js"></script>
    <script src="hls.js"></script>
    <script src="dash.js"></script>
</head>
<body>

<video id="MediaElement" preload="metadata" onplay="onPlayStateChanged()" onpause="onPlayStateChanged()" ontimeupdate="onProgressChanged()" onended="onVideoEnded()" poster="poster.png" disableremoteplayback="">
    <source id="VideoSource" src="https://mediaplatstorage1.blob.core.windows.net/windows-universal-samples-media/sintel_trailer-480p.mp4" type="video/mp4">
</video>

<div id="ErrorMessage" hidden="true">Your television does not support the selected video.</div>

<div id="MediaChrome">
    <div class="MediaDecorator" id="TopDecorator">
        <div id="Title"></div>
    </div>
    <div class="MediaDecorator" id="BottomDecorator">
        <progress id="ProgressBar" min="0" max="100" value="0">0%</progress>
        <div id="MediaControls">
            <button id="PrevBtn" aria-label="Previous" onclick="previousVideo()" style="display:none;">⏮</button>
            <button id="PlayPauseBtn" aria-label="Play" onclick="togglePlayPause()">▶</button>
            <button id="ResetBtn" aria-label="Stop" onclick="resetPlayback()">⏹</button>
            <button id="NextBtn" aria-label="Next" onclick="nextVideo()" style="display:none;">⏭</button>
            <span id="Volume">100</span>
            <button id="ToggleMuteBtn" aria-label="Mute" onclick="toggleMute()">🔇</button>
            <button id="VolumeUpBtn" aria-label="Volume Up" onclick="addVolume(0.1)">➕</button>
            <button id="VolumeDownBtn" aria-label="Volume Down" onclick="addVolume(-0.1)">➖</button>
            <span>|</span>
            <button id="ToggleSubtitlesBtn" aria-label="Subtitles" onclick="toggleSubtitles()" style="display:none;">❌</button>
            <button id="OpenStore" aria-label="Choose Media" onclick="openStore()">📁</button>
        </div>
    </div>
</div>

<div id="Dialog" style="display: none;">
    <h2>Select Video Source</h2>
    <button onclick="chooseFile()">Choose File</button>
    <input type="file" id="fileInput" style="display:none;" accept="video/*,audio/*">
    <button onclick="enterURL()">Enter URL</button>
    <button id="GoBackBtn" onclick="goBack()" style="display: none;">Go Back</button>
</div>

<script>
    let hls = null;
    let dashPlayer = null;
    let videoPlaylist;
    let currentObjectUrl = null;

    const mediaElement = document.getElementById("MediaElement");
    const playPauseBtn = document.getElementById("PlayPauseBtn");
    const resetBtn = document.getElementById("ResetBtn");
    const subtitlesBtn = document.getElementById("ToggleSubtitlesBtn");
    const dialog = document.getElementById("Dialog");
    const goBackBtn = document.getElementById("GoBackBtn");
    let currentVideoIndex = 0;
    let videoIsChanging = false;

    function initializePlayer(url) {
        cleanupPlayer();

        if (url.endsWith('.m3u8') || url.endsWith('.m3u')) {
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(mediaElement);
            } else if (mediaElement.canPlayType('application/vnd.apple.mpegurl')) {
                mediaElement.src = url;
            }
        } else if (url.endsWith('.mpd') && dashjs) {
            dashPlayer = dashjs.MediaPlayer().create();
            dashPlayer.initialize(mediaElement, url, true);
        } else {
            mediaElement.src = url;
        }
    }

    function cleanupPlayer() {
        if (hls) {
            hls.destroy();
            hls = null;
        }
        if (dashPlayer) {
            dashPlayer.reset();
            dashPlayer = null;
        }
        mediaElement.pause();
        mediaElement.removeAttribute('src');
        mediaElement.load();
    }

    document.getElementById("MediaElement").addEventListener('loadstart', function () {
        if (this.src) {
            initializePlayer(this.src);
        }
    });

    function enterURL() {
        const url = prompt("Enter Video URL:");
        if (url) {
            mediaElement.src = url;
        }
    }

    async function setDisplayModeAsync(displayType) {
        try {
            if (displayType === "dolbyVision4k") return await uwpDisplayMode.switchTVModeTo4KDVAsync();
            if (displayType === "hdr4k") return await uwpDisplayMode.switchTVModeTo4KHDRAsync();
            if (displayType === "sdr4k") return await uwpDisplayMode.switchTVModeTo4KSDRAsync();
            if (displayType === "50hz") return await uwpDisplayMode.switchTVModeTo50HzAsync();
            if (displayType === "fullhd") return true;
            console.error("Unrecognized display type:", displayType);
            return false;
        } catch (e) {
            console.error("Display mode error:", e);
            return false;
        }
    }

    async function updateDisplayModeAsync() {
        const video = videoPlaylist.Videos[currentVideoIndex];
        const success = await setDisplayModeAsync(video.DisplayType);
        setErrorState(!success);
    }

    async function updateVideoAsync() {
        try {
            videoIsChanging = true;
            resetPlayback();

            Array.from(mediaElement.querySelectorAll("track")).forEach(t => t.remove());

            const video = videoPlaylist.Videos[currentVideoIndex];
            document.getElementById("Title").innerText = `${video.Title} (${video.Subtitle})`;

            mediaElement.src = video.Url;

            if (video.TextTrack) {
                const track = document.createElement("track");
                track.label = "English";
                track.kind = "subtitles";
                track.srclang = "en";
                track.src = video.TextTrack;
                mediaElement.appendChild(track);
            }

            updatePlayPauseBtnText();
            await updateDisplayModeAsync();
        } finally {
            videoIsChanging = false;
        }
    }

    function setErrorState(isError) {
        document.getElementById("ErrorMessage").hidden = !isError;
        mediaElement.hidden = isError;
        playPauseBtn.disabled = isError;
        resetBtn.disabled = isError;
    }

    function setMediaControlsVisibility(show) {
        const chrome = document.getElementById("MediaChrome");
        chrome.hidden = !show;
        if (show) playPauseBtn.focus();
    }

    function onPlayStateChanged() {
        setMediaControlsVisibility(mediaElement.paused || mediaElement.ended);
        updatePlayPauseBtnText();
        updateResetBtnText();
    }

    function onProgressChanged() {
        const progressBar = document.getElementById("ProgressBar");
        const percent = mediaElement.duration > 0
            ? Math.floor((100 / mediaElement.duration) * mediaElement.currentTime)
            : 0;
        progressBar.value = percent;
        progressBar.innerText = `${percent}%`;
    }

    function play() {
        mediaElement.play();
    }

    function pause() {
        mediaElement.pause();
    }

    function togglePlayPause() {
        mediaElement.paused || mediaElement.ended ? play() : pause();
    }

    function resetPlayback() {
        mediaElement.pause();
        mediaElement.currentTime = 0;
        playPauseBtn.focus();
        updateResetBtnText();
    }

    function previousVideo() {
        if (!videoIsChanging) {
            currentVideoIndex = (currentVideoIndex - 1 + videoPlaylist.Videos.length) % videoPlaylist.Videos.length;
            updateVideoAsync();
        }
    }

    function nextVideo() {
        if (!videoIsChanging) {
            currentVideoIndex = (currentVideoIndex + 1) % videoPlaylist.Videos.length;
            updateVideoAsync();
        }
    }

    function addVolume(amount) {
        const newVolume = Math.min(1, Math.max(0, mediaElement.volume + amount));
        mediaElement.volume = parseFloat(newVolume.toFixed(1));
        updateVolumeText();
    }

    function toggleMute() {
        mediaElement.muted = !mediaElement.muted;
        updateMuteBtnText();
        updateVolumeText();
    }

    function toggleSubtitles() {
        const track = mediaElement.textTracks[0];
        if (track) {
            track.mode = track.mode === "showing" ? "hidden" : "showing";
            updateSubtitlesText();
        }
    }

    function updateVolumeText() {
        document.getElementById("Volume").innerText = mediaElement.volume * 100;
    }

    function updatePlayPauseBtnText() {
        playPauseBtn.innerText = mediaElement.paused ? "▶" : "❚❚";
    }

    function updateResetBtnText() {
        resetBtn.innerText = mediaElement.currentTime > 0 ? "⏹" : "▶";
    }

    function updateMuteBtnText() {
        document.getElementById("ToggleMuteBtn").innerText = mediaElement.muted ? "🔇" : "🔊";
    }

    function updateSubtitlesText() {
        subtitlesBtn.innerText = mediaElement.textTracks[0]?.mode === "showing" ? "💬" : "❌";
    }

    function openStore() {
        dialog.style.display = "block";
        goBackBtn.style.display = "inline";
    }

    function goBack() {
        dialog.style.display = "none";
        goBackBtn.style.display = "none";
    }

    function chooseFile() {
        const fileInput = document.getElementById('fileInput');
        fileInput.click();
        fileInput.onchange = function (e) {
            const file = e.target.files[0];
            if (file) {
                currentObjectUrl = URL.createObjectURL(file);
                mediaElement.src = currentObjectUrl;
                mediaElement.play();
                dialog.style.display = "none";
                goBackBtn.style.display = "none";
            }
        };
    }

    function revokeObjectUrl() {
        if (currentObjectUrl) {
            URL.revokeObjectURL(currentObjectUrl);
            currentObjectUrl = null;
        }
    }

    document.addEventListener("keydown", () => setMediaControlsVisibility(true));

    document.addEventListener("DOMContentLoaded", async function () {
        mediaElement.poster = "poster.png";
        mediaElement.disableRemotePlayback = true;

        try {
            const response = await fetch('./playlistdata/video-playlist.json');
            videoPlaylist = await response.json();
            await updateVideoAsync();
        } catch (e) {
            console.error("Failed to load playlist:", e);
        }

        playPauseBtn.focus();
        updateVolumeText();
        updateSubtitlesText();
        console.log("Media player is ready");
    });
</script>



</body></html>
